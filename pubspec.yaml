name: mdklift
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.2
  drift: 2.31.0
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: 0.5.42
  path_provider: ^2.1.5
  path:
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  flutter_local_notifications: ^19.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.31.0
  build_runner: ^2.13.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"


flutter:
  uses-material-design: true
  
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/montserrat_reg.ttf
        - asset: assets/fonts/montserrat_bold.ttf
          weight: 700
  assets:
    - assets/icons/lift_event/
    